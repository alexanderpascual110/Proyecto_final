<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nueva Contraseña</title>
</head>

<body bgcolor="#0f172a">

<center>

    <br><br><br>

    <div style="
        background:#1e293b;
        width:500px;
        padding:40px;
        border-radius:15px;
    ">

        <h1 style="color:white; font-size:40px;">
            Nueva Contraseña
        </h1>

        <form method="POST">

            <input type="text" name="codigo"
            placeholder="Código"

            style="
                width:400px;
                height:50px;
                font-size:20px;
                border-radius:10px;
                border:none;
                padding-left:15px;
            " required>

            <br><br>

            <input type="password" name="password"
            placeholder="Nueva contraseña"

            style="
                width:400px;
                height:50px;
                font-size:20px;
                border-radius:10px;
                border:none;
                padding-left:15px;
            " required>

            <br><br>

            <button type="submit"

            style="
                width:420px;
                height:55px;
                font-size:22px;
                background:#16a34a;
                color:white;
                border:none;
                border-radius:10px;
                cursor:pointer;
            ">
                Cambiar Contraseña
            </button>

        </form>

    </div>

</center>

</body>
</html>
